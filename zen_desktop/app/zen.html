    <script>
        (function () {
            if (typeof StockData !== 'function') return;

            StockData.Explain = "HQChartData真实数据";

            // 请求队列
            var pendingRequests = [];

            // 处理挂起的请求
            var processPendingRequests = function () {
                console.log('[StockData] processPendingRequests: pendingRequests.length=' + pendingRequests.length + ', StockDataInstance=' + !!window.StockDataInstance);
                if (!window.StockDataInstance) {
                    console.log('[StockData] StockDataInstance 不存在，延迟处理');
                    return;
                }
                var requests = pendingRequests.splice(0, pendingRequests.length);
                console.log('[StockData] 处理 ' + requests.length + ' 个挂起的请求');
                for (var i = 0; i < requests.length; ++i) {
                    var item = requests[i];
                    try {
                        console.log('[StockData] 处理请求: ' + (item.data ? item.data.Name : 'unknown'));
                        window.StockDataInstance.NetworkFilter(item.data, item.callback, item.option);
                    } catch (e) {
                        console.error('[StockData.NetworkFilter] 处理请求失败:', e);
                        if (typeof item.callback === 'function') {
                            item.callback({ Error: String(e) });
                        }
                    }
                }
            };

            StockData.NetworkFilter = function (data, callback, option) {
                if (data) data.PreventDefault = true;

                if (window.StockDataInstance && typeof window.StockDataInstance.NetworkFilter === 'function') {
                    // 连接已建立，直接处理请求
                    console.log('[StockData.NetworkFilter] 直接处理: ' + (data ? data.Name : 'unknown') + ', StockDataInstance=' + !!window.StockDataInstance);
                    window.StockDataInstance.NetworkFilter(data, callback, option);
                } else {
                    // 连接尚未建立，加入队列等待
                    console.log('[StockData.NetworkFilter] 加入队列: ' + (data ? data.Name : 'unknown') + ', StockDataInstance=' + !!window.StockDataInstance);
                    pendingRequests.push({ data: data, callback: callback, option: option });
                }
            };

            var tryCount = 0;
            var tryInit = function () {
                if (window.StockDataInstance) return;

                if (typeof window.ZenWSClient === 'undefined' || !window.ZenWSClient) {
                    console.log('[StockData] tryInit: 等待 ZenWSClient 就绪, tryCount=' + tryCount);
                    tryCount++;
                    setTimeout(tryInit, 200);
                    return;
                }

                console.log('[StockData] tryInit: ZenWSClient 已就绪');
                window.StockDataInstance = new StockData();
                window.StockDataInstance.WSClient = window.ZenWSClient;
                // 处理队列中的请求
                processPendingRequests();
            };
            tryInit();

            StockData.FUNC_ALPHA = function (obj) {
                var aryValue = obj.Args[0];
                var aryAlpha = obj.DownloadData;
                var aryData = [];
                for (var i = 0; i < aryValue.length; ++i) aryData.push(aryValue[i] * aryAlpha[i]);
                return { Out: aryData };
            };
        })();
    </script>

    <script>
        window.ZenAuthClient = {
            generateNonce: function () {
                var bytes = new Uint8Array(16);
                if (window.crypto && window.crypto.getRandomValues) {
                    window.crypto.getRandomValues(bytes);
                    return Array.from(bytes).map(function (n) {
                        return n.toString(16).padStart(2, '0');
                    }).join('');
                }
                return 'nonce-' + Date.now() + '-' + Math.floor(Math.random() * 1000000);
            },

            getStatus: function () {
                console.log('[ZenAuthClient] getStatus fetching...');
                var token = new URLSearchParams(window.location.search).get('token') || '';
                var url = '/api/auth/status?t=' + Date.now();
                return fetch(url, {
                    method: 'GET',
                    cache: 'no-store',
                    headers: token ? {'X-Zen-Token': token} : {}
                })
                    .then(function (r) {
                        console.log('[ZenAuthClient] getStatus response status:', r.status);
                        return r.json().catch(function(e) { 
                            console.log('[ZenAuthClient] getStatus json parse error:', e);
                            return { machine_code: null }; 
                        });
                    })
                    .catch(function(e) {
                        console.log('[ZenAuthClient] getStatus fetch error:', e);
                        return { machine_code: null };
                    });
            },

            saveLicense: function (licenseKey) {
                var token = new URLSearchParams(window.location.search).get('token') || '';
                var url = '/api/auth/license';
                return fetch(url, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Zen-Token': token
                    },
                    body: JSON.stringify({license_key: licenseKey})
                })
                .then(function (r) {
                    if (!r.ok) throw new Error('auth save unavailable');
                    return r.json();
                });
            },

            createSession: function (appId, platform) {
                var token = new URLSearchParams(window.location.search).get('token') || '';
                var nonce = this.generateNonce();
                var url = '/api/auth/session';
                return fetch(url, {
                    method: 'POST',
                    mode: 'cors',
                    cache: 'no-store',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Zen-Token': token
                    },
                    body: JSON.stringify({
                        nonce: nonce,
                        app_id: appId,
                        platform: platform
                    })
                })
                .then(function (r) {
                    if (!r.ok) throw new Error('auth session unavailable');
                    return r.json();
                })
                .then(function (data) {
                    data = data || {};
                    data.nonce = nonce;
                    data.app_id = appId;
                    data.platform = platform;
                    return data;
                });
            }
        };

        window.showZenAuthPanel = function(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            var authPanel = document.getElementById('AuthPanel');
            var authMachineCode = document.getElementById('AuthMachineCode');
            var authInput = document.getElementById('AuthInput');
            if (!authPanel) { console.log('[ZenAuthClient] AuthPanel not found'); return; }
            if (authPanel.style.display === 'none') {
                authPanel.style.display = 'block';
                if (authMachineCode) authMachineCode.textContent = '机器码: 获取中...';
                var controller = new AbortController();
                var timeout = setTimeout(function() { controller.abort(); }, 5000);
                window.ZenAuthClient.getStatus()
                    .then(function(data){
                        clearTimeout(timeout);
                        console.log('[ZenAuthClient] getStatus resolved, data=', data);
                        if (controller) controller.abort();
                        if (authMachineCode) authMachineCode.textContent = '机器码: ' + (data && data.machine_code || '未知');
                        if (authInput) authInput.value = (data && data.license_key) || '';
                    })
                    .catch(function(e){
                        clearTimeout(timeout);
                        console.log('[ZenAuthClient] getStatus rejected:', e);
                        if (authMachineCode) authMachineCode.textContent = '机器码: 获取失败';
                    });
            } else {
                authPanel.style.display = 'none';
            }
        };

        window.submitZenAuthPanel = function(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            var authInput = document.getElementById('AuthInput');
            var authPanel = document.getElementById('AuthPanel');
            if (!authInput) return;
            var content = authInput.value.trim();
            if (!content) return;
            window.ZenAuthClient.saveLicense(content)
            .then(function(data){
                if (data && data.success) {
                    if (window.ChartContainer && window.ChartContainer.ZenChartCtrl && typeof window.ChartContainer.ZenChartCtrl.CheckLicense === 'function') {
                        window.ChartContainer.ZenChartCtrl.CheckLicense();
                    }
                    alert('授权保存成功');
                    if (authPanel) authPanel.style.display = 'none';
                } else {
                    alert('授权保存失败: ' + (data && data.message || '未知错误'));
                }
            })
            .catch(function(e){
                alert('授权保存失败: ' + e);
            });
        };

        window.closeZenAuthPanel = function(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            var authPanel = document.getElementById('AuthPanel');
            if (authPanel) authPanel.style.display = 'none';
        };
    </script>

                    var symbol = data.Request.Data.symbol;    //板块代码
                    data.PreventDefault = true;

                    if (window.ChartContainer) window.ChartContainer.SelectedMemberListSymbol = symbol;
                    var baseList = (window.ChartContainer && window.ChartContainer.BaseSymbolsMap && Array.isArray(window.ChartContainer.BaseSymbolsMap[symbol])) ? window.ChartContainer.BaseSymbolsMap[symbol].slice(0) : [];
                    var userList = (window.ChartContainer && window.ChartContainer.WatchSymbolsMap && Array.isArray(window.ChartContainer.WatchSymbolsMap[symbol])) ? window.ChartContainer.WatchSymbolsMap[symbol].slice(0) : [];
                    var wc = window.ChartContainer.watchlistCanonical.bind(window.ChartContainer);
                    var seen = {};
                    var merged = [];
                    function pushWL(sym) {
                        var c = wc(sym);
                        if (!c || seen[c]) return;
                        seen[c] = true;
                        merged.push(c);
                    }
                    for (var i = 0; i < baseList.length; i++) pushWL(baseList[i]);
                    for (var j = 0; j < userList.length; j++) pushWL(userList[j]);

                    var hqchartData = { symbol: symbol, name: symbol, data: merged };

                    console.log("[ReportChart::RecvMemberListDataV2] hqchartData", hqchartData);
                    callback(hqchartData);
                }

                this.LogZen = function (text) {

                this.ActiveKLinePeriod = null;

                        var c = this.watchlistCanonical(sym);
                        if (!c || !Array.isArray(arr)) return false;
                        for (var i = 0; i < arr.length; i++) {
                            if (this.watchlistCanonical(arr[i]) === c) return true;
                        }
                        return false;
                    };
                    this.watchlistRemoveFromList = function (list, sym) {
                        if (!Array.isArray(list)) return false;
                        var c = this.watchlistCanonical(sym);
                        if (!c) return false;
                        for (var i = list.length - 1; i >= 0; i--) {
                            if (this.watchlistCanonical(list[i]) === c) {
                                list.splice(i, 1);

                            }

                    };
                    // 加载 watchlist（同步等待完成，确保其他组件初始化时已有数据）
                    this.WatchListStorageKey = 'HQChartDemo_WatchList_v1';
                    this.LoadWatchListStorageFromAPI = async () => {

                    this.ApplyStockHistory = () => {

                    // 辅助函数：获取报价容器
                    var getReportContainer = function () {
                        var reportChart = window.ChartContainer && window.ChartContainer.SelfReport ? window.ChartContainer.SelfReport.Chart : null;
                        return reportChart ? reportChart.JSChartContainer : null;
                    };
                    var getReportAllSymbols = function (reportContainer) {

                        var symbols = report && report.Data && Array.isArray(report.Data.Data) ? report.Data.Data : [];
                        return symbols;

                    var getCurrentSelectedIndex = function (container, reportContainer, symbols) {
                        if (!symbols || symbols.length <= 0) return -1;
                        var report = reportContainer && reportContainer.ChartPaint ? reportContainer.ChartPaint[0] : null;
                        if (report && report.SelectedRowData) {
                            var dataIndex = report.SelectedRowData.DataIndex;
                            if (typeof dataIndex === 'number' && dataIndex >= 0 && dataIndex < symbols.length) return dataIndex;
                            if (report.SelectedRowData.Symbol) {
                                var selected = String(report.SelectedRowData.Symbol).toLowerCase();
                                for (var i = 0; i < symbols.length; ++i) {

                        if (currentSymbol) {

                            for (var j = 0; j < symbols.length; ++j) {

                        if (typeof container.SelfReportCurrentRowIndex === 'number' && container.SelfReportCurrentRowIndex >= 0 && container.SelfReportCurrentRowIndex < symbols.length) {

                    var selectReportSymbol = function (container, symbol, dataIndex, autoYScroll) {

                    // 键盘事件处理：根据焦点状态决定处理方式
                    if (!document.__zenReportKeyNavBound) {

                        document.addEventListener('keydown', (e) => {

                            return;

                        var isDown = (key === 'ArrowDown' || key === 'Down' || key === 40);
                        var isUp = (key === 'ArrowUp' || key === 'Up' || key === 38);

                        if (!isDown && !isUp) return;

                        // 只有在焦点不在输入框中时才处理
                        var activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
                        if (activeTag === 'input' || activeTag === 'textarea') {

                        // 如果焦点在图表区域，让 HQChart 处理（已启用 KeyDown:true）

                    var normalizeInputSymbol = function (symbol) {

                        if (!sym) return null;
                        var m = null;
                        m = sym.match(/^([sS][hH]|[sS][zZ]|[bB][jJ])(\d{6})$/);
                        if (m) return (m[2] + '.' + m[1]).toLowerCase();
                        m = sym.match(/^(\d{6})(?:[. ]?)([sS][hH]|[sS][zZ]|[bB][jJ])$/);
                        if (m) return (m[1] + '.' + m[2]).toLowerCase();

                        sym = sym.toLowerCase();
                        if (sym.indexOf('.') > 0) return sym;

                        if (/^\d{6}$/.test(sym)) {
                            if (sym.indexOf('399') === 0) return sym + '.sz';
                            var c0 = sym[0];
                            if (c0 === '6' || c0 === '5' || c0 === '9') return sym + '.sh';
                            if (c0 === '4' || c0 === '8') return sym + '.bj';
                            return sym + '.sz';
                        }
                        return sym;
                    };
                    var removeSymbolFromList = function (list, symbol) {

                    };
                    var syncMainSymbol = function (symbol) {
                        symbol = normalizeInputSymbol(symbol);
                        if (!symbol) return;

                        if (self.SelectedReportSymbol && self.SelectedReportSymbol.toLowerCase() === symbol.toLowerCase()) {
                            return;

                        self.SelectedReportSymbol = symbol;

                        // 获取当前周期和 DayCount 设置
                        var hqchartBefore = self.MinuteCtrl && self.MinuteCtrl.Chart ? self.MinuteCtrl.Chart.JSChartContainer : null;
                        var period = hqchartBefore ? hqchartBefore.Period : 7; // 默认 30 分钟
                        var isMinutePeriod = (typeof period === 'number' && period >= 4);

                        // 切换股票

                        if (self.KLineCtrl) self.KLineCtrl.ChangeSymbol(symbol);

                        // 分钟周期切换后，立即设置足够的 DayCount
                        if (isMinutePeriod && self.MinuteCtrl && self.MinuteCtrl.ChangeDayCount) {
                            var barsPerDayMap = { 4: 240, 5: 48, 6: 16, 7: 8, 8: 4 };
                            var barsPerDay = barsPerDayMap[period] || 8;
                            var targetDayCount = Math.ceil(500 / barsPerDay);
                            targetDayCount = Math.max(targetDayCount, 60);
                            console.log('[Zen] syncMainSymbol: 股票切换，强制设置 DayCount=' + targetDayCount);
                            self.MinuteCtrl.ChangeDayCount(targetDayCount);

                        if (self.ZenEnabled && self.ZenChartCtrl) {
                            if (typeof self.ZenChartCtrl.ClearDrawings === 'function') self.ZenChartCtrl.ClearDrawings(false);

                            if (typeof self.LogZen === 'function') self.LogZen('正在载入 ' + symbol + '...');

                            // 保存当前 K 线数据的锚点（用于验证数据是否真正更新）
                            var hqchart = self.KLineCtrl && self.KLineCtrl.Chart ? self.KLineCtrl.Chart.JSChartContainer : null;
                            var kData = hqchart && hqchart.ChartPaint && hqchart.ChartPaint[0] ? hqchart.ChartPaint[0].Data : null;
                            if (kData && kData.Data && kData.Data.length > 0) {
                                var firstK = kData.Data[0];
                                self.ZenChartCtrl._pendingAnchor = {
                                    symbol: symbol,  // 记录目标股票
                                    firstDate: firstK.Date || (Array.isArray(firstK) ? firstK[0] : null),
                                    firstTime: firstK.Time || (Array.isArray(firstK) ? firstK[1] : 0),
                                    waiting: true    // 标记正在等待数据更新

                                if (ctrl.IsEnabled) ctrl._checkAndReAnalyzeDebounced();
                            }, 100);
                        }
                    };
                    var highlightReportSymbol = function (symbol) {
                        var maxTry = 20; // 增加尝试次数
                        var tryCount = 0;
                        var isSynced = false;
                        var trySelect = function () {
                            tryCount++;
                            var reportChart = self.SelfReport ? self.SelfReport.Chart : null;
                            var reportContainer = reportChart ? reportChart.JSChartContainer : null;
                            var ok = false;
                            if (reportContainer && typeof reportContainer.SetSelectedRow === 'function') {
                                reportContainer.SetSelectedRow({ Symbol: symbol });
                                if (reportContainer.ChartPaint && reportContainer.ChartPaint[0] && typeof reportContainer.ChartPaint[0].GetSelectedSingleSymbol === 'function') {
                                    var selected = reportContainer.ChartPaint[0].GetSelectedSingleSymbol();
                                    if (selected) ok = (selected.toLowerCase() === symbol.toLowerCase());
                                } else {
                                    // 如果无法获取选中状态，只要设置了就尝试同步
                                    ok = true;
                                }
                                // 滚动到选中行使其可见
                                if (ok && typeof reportContainer.GetSelectedRow === 'function') {
                                    var rowIdx = reportContainer.GetSelectedRow();
                                    if (typeof rowIdx === 'number' && rowIdx >= 0 && reportContainer.ChartFrame && reportContainer.ChartFrame.Get !== undefined) {
                                        var frame = reportContainer.ChartFrame;
                                        if (frame.Get && frame.Get(0)) {
                                            var div = frame.Get(0).GetDiv();
                                            if (div && div.scrollIntoView) {
                                                // 使用 requestAnimationFrame 确保 DOM 更新完成后再滚动
                                                requestAnimationFrame(function() {
                                                    try { div.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch(e) {}
                                                });
                                            }
                                        }
                                    }
                                }
                            }
                            if (ok && !isSynced) {
                                isSynced = true;
                                syncMainSymbol(symbol);
                            }
                            if (!isSynced && tryCount < maxTry) setTimeout(trySelect, 150);
                        };
                        setTimeout(trySelect, 300);
                    };
                    var doAddWatch = function () {
                        var sym = normalizeInputSymbol(watchInput && watchInput.value ? watchInput.value : '');
                        if (!sym) return;
                        var baseList = getActiveBaseList();
                        if (self.watchlistListContains(baseList, sym)) {
                            highlightReportSymbol(sym);
                            syncMainSymbol(sym);
                            if (watchInput) watchInput.value = '';
                            return;
                        }
                        var userList = getActiveUserList();
                        if (!self.watchlistListContains(userList, sym)) {
                            userList.push(sym);
                            if (self.SelfReport && self.SelfReport.Chart) self.SelfReport.Chart.AddSymbol([sym], { IsSort: true });
                            if (typeof self.SaveWatchListStorage === 'function') self.SaveWatchListStorage();
                            // 记录添加操作到历史
                            if (typeof self.AddToHistory === 'function') self.AddToHistory(sym, 'added');

                        highlightReportSymbol(sym);

                        if (watchInput) watchInput.value = '';

                    if (addBtn) addBtn.onclick = doAddWatch;

                        if (!e) return;

                    if (removeBtn) removeBtn.onclick = function () {

                        if (reportContainer && reportContainer.ChartPaint && reportContainer.ChartPaint[0] && typeof reportContainer.ChartPaint[0].GetSelectedSingleSymbol === 'function') {
                            sym = reportContainer.ChartPaint[0].GetSelectedSingleSymbol();
                        }
                        if (!sym) sym = self.SelectedReportSymbol;
                        if (!sym) return;
                        var userList = getActiveUserList();
                        if (removeSymbolFromList(userList, sym)) {
                            self.SelectedReportSymbol = null;
                            if (self.SelfReport && self.SelfReport.Chart) self.SelfReport.Chart.DeleteSymbol([sym], { IsSort: true });
                            if (typeof self.SaveWatchListStorage === 'function') self.SaveWatchListStorage();
                            // 记录删除操作到历史
                            if (typeof self.AddToHistory === 'function') self.AddToHistory(sym, 'removed');
                            return;
                        }
                        var baseList = getActiveBaseList();
                        if (removeSymbolFromList(baseList, sym)) {
                            self.SelectedReportSymbol = null;
                            if (self.SelfReport && self.SelfReport.Chart) self.SelfReport.Chart.DeleteSymbol([sym], { IsSort: true });
                            if (typeof self.SaveWatchListStorage === 'function') self.SaveWatchListStorage();
                            // 记录删除操作到历史
                            if (typeof self.AddToHistory === 'function') self.AddToHistory(sym, 'removed');
                            return;
                        }
                    };

                    // 授权按钮事件已移至全局 window.showZenAuthPanel 等函数中直接内联到HTML上，无需在此重复绑定。

                    // First run: ensure Shanghai index in the single watchlist (MEMBER_LIST_KEY).
                    var defaultSymbol = "000001.sh";
                    var wlKey = self.MEMBER_LIST_KEY;
                    if (!self.WatchSymbolsMap[wlKey]) self.WatchSymbolsMap[wlKey] = [];
                    var userList = self.WatchSymbolsMap[wlKey];

                            // 注意：此时 hqchart.Symbol 可能已经是新股票，但数据可能还没更新
                            // 所以我们先清除锚点，让 HandleDataChange 等待数据更新后再触发分析
                            this.ZenChartCtrl._pendingAnchor = null;
                            this.ZenChartCtrl._lastSymbol = null;
                            this.ZenChartCtrl._lastPeriod = null;
                            this.ZenChartCtrl._lastState = null;
                            this.ZenChartCtrl._lastSentDataOffset = null;

                            // 重置数据扩展状态，防止上一个周期的 noMore 状态影响

                        console.log('[Zen] HandleDataChange: 分析状态为 ' + this._analysisState + '，跳过');
                        return;
                    }

                    var klineChart = this.GetKLineChart();
                    var hqchart = klineChart && klineChart.Chart ? klineChart.Chart.JSChartContainer : null;
                    if (!hqchart) {
                        this._setAnalysisState('idle');
                        return;
                    }

                    // === 验证K线绘制是否完成 ===
                    // 检查 DrawKRange 或 ShowRange 是否已更新，确保K线已经绘制完成
                    var paint = hqchart.ChartPaint && hqchart.ChartPaint[0];
                    if (!paint) {
                        console.log('[Zen] HandleDataChange: K线绘制未完成，等待...');
                        var self = this;
                        var delay = this._retryDelay;
                        this._retryDelay = Math.min(this._retryDelay * 2, 800);
                        setTimeout(function() {
                            if (self.IsEnabled) self._checkAndReAnalyzeDebounced();
                        }, delay);
                        return;
                    }
                    
                    // 检查绘制范围是否有效
                    var hasDrawKRange = paint.DrawKRange && typeof paint.DrawKRange.Start === 'number';
                    var hasShowRange = paint.ShowRange && typeof paint.ShowRange.Start === 'number';
                    if (!hasDrawKRange && !hasShowRange) {
                        console.log('[Zen] HandleDataChange: K线绘制范围未就绪，等待...');
                        var self = this;
                        var delay = this._retryDelay;
                        this._retryDelay = Math.min(this._retryDelay * 2, 800);
                        setTimeout(function() {
                            if (self.IsEnabled) self._checkAndReAnalyzeDebounced();
                        }, delay);
                        return;
                    }

                    var range = this.GetVisibleRange();
                    var currentSymbol = hqchart.Symbol;
                    var currentPeriod = hqchart.Period;

                    // 优先使用 RECV_HISTROY_DATA 事件传递的完整数据，其次使用 ChartPaint 中的数据
                    var kData = null;
                    var currentCount = 0;
                    if (this._pendingHistoryData && this._pendingHistoryData.length > 0) {
                        // 使用事件传递的完整数据
                        kData = { Data: this._pendingHistoryData };
                        currentCount = this._pendingHistoryData.length;
                        this._pendingHistoryData = null;  // 清除已使用的数据
                        console.log('[Zen] HandleDataChange: 使用 _pendingHistoryData, count=', currentCount);
                    } else {
                        // 回退到 ChartPaint 中的数据
                        kData = hqchart.ChartPaint && hqchart.ChartPaint[0] ? hqchart.ChartPaint[0].Data : null;
                        currentCount = (kData && kData.Data) ? kData.Data.length : 0;
                    }

                    // 验证 K 线数据是否有效（放宽条件：至少1根K线即可）
                    var firstKDate = kData && kData.Data && kData.Data.length >= 1 ? (kData.Data[0].Date || 0) : 0;
                    // 检查日期是否有效（不是未来日期）
                    var now = new Date();
                    var currentYear = now.getFullYear();
                    var currentMonth = now.getMonth() + 1;
                    var currentDay = now.getDate();
                    var currentDateValue = currentYear * 10000 + currentMonth * 100 + currentDay;
                    var isFutureDate = firstKDate > currentDateValue;
                    var hasValidData = kData && kData.Data && kData.Data.length >= 1 &&
                        !isFutureDate &&
                        (kData.Data[0].Date || kData.Data[0].Time || Array.isArray(kData.Data[0]));

                    // 获取当前数据的锚点（如果数据有效）
                    var currentAnchor = null;
                    if (hasValidData) {
                        var firstK = kData.Data[0];
                        var curDate = firstK.Date || (Array.isArray(firstK) ? firstK[0] : null);
                        var curTime = firstK.Time || (Array.isArray(firstK) ? firstK[1] : 0);
                        currentAnchor = {
                            firstDate: curDate,
                            firstTime: curTime,
                            symbol: currentSymbol
                        };
                        console.log('[Zen] HandleDataChange: currentSymbol=', currentSymbol, 'firstDate=', curDate, 'firstTime=', curTime, 'count=', currentCount);
                    } else {
                        console.log('[Zen] HandleDataChange: 没有有效数据，currentSymbol=', currentSymbol, 'count=', currentCount);
                        // 数据未准备好，稍后重试（最多重试5次，避免无限等待）
                        if (this.IsEnabled && this._switchWaitCount < 5) {
                            this._switchWaitCount++;
                            var self = this;
                            var delay = this._retryDelay;
                            this._retryDelay = Math.min(this._retryDelay * 2, 800);
                            setTimeout(function () {
                                if (self.IsEnabled) self._checkAndReAnalyzeDebounced();

                        } else {
                            // 达到重试上限，使用已有数据强制触发分析
                            console.log('[Zen] HandleDataChange: 重试次数达到上限，强制使用当前数据 count=' + currentCount);
                            this._switchWaitCount = 0;
                            // 清除锚点，允许用当前数据强制分析
                            this._pendingAnchor = null;
                            // 强制触发分析
                            this._analyzing = false;
                            this._setAnalysisState('idle');
                            this._lastDrawnJobId = null;
                            this.HandleDataChange();
                        }
                        return;
                    }

                    // 检测是否是股票切换（通过锚点变化判断，比 Symbol 更可靠）
                    var isSymbolChanged = false;
                    var pendingSymbol = this._pendingAnchor ? this._pendingAnchor.symbol : null;
                    if (this._pendingAnchor && currentAnchor) {
                        // 比较锚点和 Symbol
                        isSymbolChanged = this._pendingAnchor.symbol !== currentSymbol ||
                            this._pendingAnchor.firstDate !== currentAnchor.firstDate ||
                            this._pendingAnchor.firstTime !== currentAnchor.firstTime;
                        console.log('[Zen] HandleDataChange: pendingSymbol=' + pendingSymbol + ', currentSymbol=' + currentSymbol +
                            ', isSymbolChanged=' + isSymbolChanged + ', currentCount=' + currentCount);
                    } else if (!this._pendingAnchor && currentAnchor) {
                        // 没有锚点，说明是首次加载
                        isSymbolChanged = true;
                        console.log('[Zen] HandleDataChange: 无锚点，首次加载，currentCount=' + currentCount);
                    } else if (this._pendingAnchor && !currentAnchor) {
                        // 有锚点但没数据，继续等待
                        isSymbolChanged = true;
                        console.log('[Zen] HandleDataChange: 有锚点但无数据，pendingSymbol=' + pendingSymbol + ', currentCount=' + currentCount);
                    }

                    // 如果正在分析中或状态为analyzing/drawing，检查是否有新的切换
                    if (this._analyzing || this._analysisState === 'analyzing' || this._analysisState === 'drawing') {
                        if (!isSymbolChanged) {
                            console.log('[Zen] HandleDataChange: 分析进行中且未切换股票，跳过');
                            return;
                        }
                        // 有新的切换，重置所有分析状态
                        console.log('[Zen] HandleDataChange: 分析中但股票切换，重置所有状态');
                        this._analyzing = false;
                        this._setAnalysisState('idle');
                        this._lastDrawnJobId = null;  // 清除上次绘制的jobId
                    }

                    // 如果数据没准备好，继续等待
                    if (!currentAnchor) {
                        var self = this;
                        var delay = this._retryDelay;
                        this._retryDelay = Math.min(this._retryDelay * 2, 800);
                        if (this._waitingTimer) { clearTimeout(this._waitingTimer); }
                        this._waitingTimer = setTimeout(function () {
                            self.HandleDataChange();
                        }, delay);
                        console.log('[Zen] HandleDataChange: 等待数据加载...');
                        return;
                    }

                    // 如果锚点变化了，说明股票切换了，需要重新设置锚点并等待
                    // 注意：不要用 currentAnchor 覆盖 _pendingAnchor，因为 currentAnchor 可能还是旧股票的数据
                    // 正确的做法是保留 _pendingAnchor（目标股票），等待数据更新
                    if (isSymbolChanged) {
                        // 如果已经有目标锚点且当前股票不同，说明正在切换中
                        // 关键修复：当股票切换时，应该立即清空锚点并用当前数据触发分析，
                        // 而不是等待数据更新。因为 symbol 变化本身就说明数据已经变了。
                        if (this._pendingAnchor && this._pendingAnchor.symbol !== currentSymbol) {
                            console.log('[Zen] HandleDataChange: 股票切换，清空所有状态 pendingSymbol=', this._pendingAnchor.symbol, 'currentSymbol=', currentSymbol);
                            // 立即清空锚点，让后续逻辑用当前数据更新锚点并触发分析
                            this._pendingAnchor = null;
                            // 清空上次状态，确保后续状态检测触发分析
                            this._lastState = null;
                            // 重置分析状态，确保新股票可以正常分析
                            this._setAnalysisState('idle');
                            this._lastDrawnJobId = null;
                            this._drawScheduled = false;
                            // 重置数据扩展状态，确保新股票可以从头加载数据
                            this._rangeExpandState = {
                                lastCount: 0,
                                stableTicks: 0,
                                lastRequestDayCount: null,
                                noMore: false,
                                period: null,
                                lastRequestTime: 0,
                                leftmostSeen: null
                            };
                            this._requestingMoreData = false;
                            // 不 return，继续执行下面的逻辑
                        } else if (this._pendingAnchor) {
                            // pendingAnchor 存在但 symbol 匹配（可能 firstDate/firstTime 变了）
                            // 更新锚点为当前数据
                            this._pendingAnchor = currentAnchor;
                            this._lastSymbol = currentSymbol;
                            this._lastPeriod = currentPeriod;
                            // 清空上次状态，确保后续状态检测触发分析
                            this._lastState = null;
                            console.log('[Zen] HandleDataChange: 更新锚点（数据变化），symbol=', currentSymbol, 'period=', currentPeriod);
                        } else {
                            // 没有 pendingAnchor，首次加载
                            this._pendingAnchor = currentAnchor;
                            this._lastSymbol = currentSymbol;
                            this._lastPeriod = currentPeriod;
                            // 清空上次状态，确保后续状态检测触发分析
                            this._lastState = null;
                            console.log('[Zen] HandleDataChange: 设置锚点（首次加载），symbol=', currentSymbol, 'period=', currentPeriod);
                        }
                    } else {
                        // 如果处于待切换状态且数据没变，继续等待，最多重试10次避免死循环
                        var isWaiting = this._pendingAnchor && this._pendingAnchor.waiting;
                        if (isWaiting && this._switchWaitCount < 10) {
                            this._switchWaitCount++;
                            console.log('[Zen] HandleDataChange: waiting=' + isWaiting + '，数据尚未更新，等待重试 (' + this._switchWaitCount + '/10)，currentCount=' + currentCount);
                            var self = this;
                            if (this._waitingTimer) { clearTimeout(this._waitingTimer); }
                            this._waitingTimer = setTimeout(function () {
                                self.HandleDataChange();
                            }, 200);
                            return;
                        }
                        // 锚点已经匹配或者达到重试上限，重置计数器
                        // 如果数据量 < 100（日线数据不足），强制触发分析
                        if (isWaiting && currentCount < 100) {
                            console.log('[Zen] HandleDataChange: waiting=' + isWaiting + ' 且数据量过少(' + currentCount + ')，强制触发分析');
                            this._switchWaitCount = 0;
                            // 设置锚点为当前数据，并触发一次分析
                            this._pendingAnchor = currentAnchor;
                            this._lastSymbol = currentSymbol;
                            this._lastPeriod = currentPeriod;
                            // 设置 _lastState，避免下次 _hasStateChanged 返回 true
                            if (range) {
                                this._lastState = {
                                    symbol: currentSymbol,
                                    period: currentPeriod,
                                    total: currentCount,
                                    start: range.Start,
                                    end: range.End
                                };
                            }
                            // 强制触发分析（不清空 _lastState，让它保持一致）
                            console.log('[Zen] HandleDataChange: 强制触发分析 symbol=', currentSymbol, 'count=', currentCount);
                            this._retryDelay = 50;
                            var isFirstDraw = !this._lastDrawnJobId;
                            if (isFirstDraw) {
                                var self = this;
                                setTimeout(function () {
                                    if (self.IsEnabled) {
                                        self.RequestAnalyzeCurrentData({ ForceCancel: true, Debounce: false });
                                    }
                                }, 200);
                            } else {
                                this.RequestAnalyzeCurrentData({ ForceCancel: true, Debounce: false });
                            }
                            return;  // 强制分析后直接返回，避免重复触发
                        } else {
                            this._switchWaitCount = 0;
                        }
                    }

                    // 数据已准备好且锚点匹配
                    // 如果分析开关没开，直接返回（不触发分析）
                    if (!this.IsEnabled) {
                        console.log('[Zen] HandleDataChange: 分析已禁用，跳过');
                        return;
                    }

                    // 正常检测数据/范围变化
                    if (!range) return;

                    // 使用新方法检查状态变化（包括 period 和数据量）
                    if (this._hasStateChanged(currentSymbol, currentPeriod, range, currentCount)) {
                        this.CurrentSymbol = currentSymbol;
                        this._retryDelay = 50;
                        this._lastState = {
                            symbol: currentSymbol,
                            period: currentPeriod,
                            total: currentCount,
                            start: range.Start,
                            end: range.End
                        };
                        console.log('[Zen] HandleDataChange: 触发分析 symbol=', currentSymbol, 'count=', currentCount, 'range=', range.Start, '-', range.End);

                        // 第一次绘制或股票切换时，增加短暂延迟确保数据稳定
                        var isFirstDraw = !this._lastDrawnJobId;
                        if (isFirstDraw || isSymbolChanged) {
                            console.log('[Zen] 首次绘制或股票切换，延迟200ms确保数据稳定');
                            var self = this;
                            setTimeout(function () {
                                if (self.IsEnabled) {
                                    self.RequestAnalyzeCurrentData({ ForceCancel: true, Debounce: false });
                                }
                            }, 200);
                        } else {
                            this.RequestAnalyzeCurrentData({ ForceCancel: true, Debounce: false });
                        }
                        return;
                    }

                    // 范围变化，触发重新分析（保存最新的 period）
                    if (this._lastState.start !== range.Start || this._lastState.end !== range.End) {
                        this.RequestAnalyzeCurrentData({ ForceCancel: false, Debounce: true });
                        this._lastState.start = range.Start;
                        this._lastState.end = range.End;
                        this._lastState.period = currentPeriod;
                    } else if (this._pendingAnchor && this._pendingAnchor.waiting) {
                        // _pendingAnchor.waiting 为 true，说明是等待数据加载的锚点
                        // 无论是否有 _lastDrawnJobId，都应该清除 waiting 状态，避免"正在载入"一直显示
                        if (window.ChartContainer && typeof window.ChartContainer.LogZen === 'function') {
                            if (this._lastDrawnJobId) {
                                var logText = '日线 ' + currentCount + ' 根';
                                console.log('[Zen] HandleDataChange: 清除正在载入(有分析结果)，显示 ' + logText);
                                window.ChartContainer.LogZen(logText);
                            } else {
                                console.log('[Zen] HandleDataChange: 清除正在载入(首次加载)，currentCount=' + currentCount);
                                window.ChartContainer.LogZen('日线 ' + currentCount + ' 根');
                            }
                        }
                        this._pendingAnchor.waiting = false;
                    }

                    // 日线数据量过少（< 100根），显示加载提示
                    // 但如果已经有分析结果（_lastDrawnJobId），则不再设置 waiting，避免无限循环
                    if (currentPeriod === 0 && currentCount > 0 && currentCount < 100) {
                        if (window.ChartContainer && typeof window.ChartContainer.LogZen === 'function') {
                            // 如果已经有分析结果，显示实际数据量；否则显示加载提示
                            if (this._lastDrawnJobId) {
                                window.ChartContainer.LogZen('日线 ' + currentCount + ' 根');
                            } else {
                                window.ChartContainer.LogZen('加载中 ' + currentCount + ' 根...');
                            }
                        }
                        // 只有在没有分析结果时才设置 waiting，让行2924的逻辑在10次重试后强制触发分析
                        if (this._pendingAnchor && !this._lastDrawnJobId) {
                            this._pendingAnchor.waiting = true;
                        } else {
                            // 已有分析结果，清除 waiting 状态
                            this._pendingAnchor.waiting = false;
                        }
                    }
                };

                this.AnalyzeAfterDataReady = function (expectedSymbol) {
                    this._checkAndReAnalyzeDebounced();

                    var selfZen = this;
                    setTimeout(function () {
                        if (selfZen.IsEnabled) selfZen._checkAndReAnalyzeDebounced();
                    }, 100);
                };

                this.StartAnalysis = function () {
                    this.IsEnabled = true;
                    this._licenseChecked = false; // 重置授权检查标志，由 Worker ready 消息触发
                    this.RegisterDataCallback();

                    // 初始禁用配置按钮，等待授权成功后再启用
                    this._updateConfigButtonsState(false);

                    // 重置分析状态，确保重新分析所有可见数据
                    this._lastState = null;
                    this._jobIndexOffset = null;
                    this._lastSymbol = null;
                    this._lastPeriod = null;
                    this._analysisState = 'idle';
                    this._drawScheduled = false;
                    this._analyzing = false;

                    var klineChart = this.GetKLineChart();
                    var hqchart = klineChart && klineChart.Chart ? klineChart.Chart.JSChartContainer : null;
                    if (hqchart && hqchart.Symbol) {
                        this.CurrentSymbol = hqchart.Symbol;
                        // 保存当前 period 到 _lastState
                        this._lastState = {
                            symbol: hqchart.Symbol,
                            period: hqchart.Period,
                            total: 0,
                            start: null,
                            end: null
                        };
                    }
                    
                    // 等待Worker和WASM初始化完成后再触发分析
                    var selfZen = this;
                    this.EnsureWorker(false).then(function() {
                        console.log('[Zen] StartAnalysis: Worker已就绪，触发首次分析');
                        if (selfZen.IsEnabled) {
                            selfZen._checkAndReAnalyzeDebounced();
                            // 额外延迟触发，确保数据已加载
                            setTimeout(function() {
                                if (selfZen.IsEnabled) selfZen._checkAndReAnalyzeDebounced();
                            }, 200);
                        }
                    }).catch(function(e) {
                        console.error('[Zen] StartAnalysis: Worker初始化失败', e);
                    });
                };

                this.RegisterDataCallback = function () {
                    var klineChart = this.GetKLineChart();
                    var hqchart = klineChart && klineChart.Chart ? klineChart.Chart.JSChartContainer : null;
                    if (!hqchart) {
                        console.log('[Zen] RegisterDataCallback: hqchart 为空，跳过');
                        return;
                    }

                    console.log('[Zen] RegisterDataCallback: IsEnabled=' + this.IsEnabled + ', Symbol=' + hqchart.Symbol);

                    // 先移除旧的所有回调，确保唯一性
                    hqchart.RemoveEventCallback(JSCHART_EVENT_ID.RECV_HISTROY_DATA);
                    hqchart.RemoveEventCallback(JSCHART_EVENT_ID.CHART_STATUS);
                    hqchart.RemoveEventCallback(JSCHART_EVENT_ID.ON_SCROLLBAR_SLIDER_CHANGED);

                    if (this.IsEnabled) {
                        var self = this;

                        // 1. 历史数据接收事件 - 使用 jscommon 标准的 RECV_HISTROY_DATA 事件
                        hqchart.AddEventCallback({
                            event: JSCHART_EVENT_ID.RECV_HISTROY_DATA,
                            callback: function (event, data, obj) {
                                // 注意：data.HistoryData 是 bindData (ChartData 对象)，数组在 .Data 属性中
                                var historyData = data && data.HistoryData;
                                var dataArray = historyData && historyData.Data;
                                console.log('[Zen] RECV_HISTROY_DATA: historyData=', !!historyData, 'dataArray=', !!dataArray, 'length=', dataArray ? dataArray.length : 0);

                                // 保存事件传递的数据（这是完整数据）
                                if (dataArray && Array.isArray(dataArray) && dataArray.length > 0) {
                                    self._pendingHistoryData = dataArray;
                                    console.log('[Zen] RECV_HISTROY_DATA: 保存 _pendingHistoryData, count=', dataArray.length);
                                    // 只有当有有效数据时才触发 HandleDataChange
                                    if (self.IsEnabled) {
                                        self.HandleDataChange();
                                    }
                                } else {
                                    // 数据为空或无效，打印警告
                                    console.log('[Zen] RECV_HISTROY_DATA: 数据为空，跳过处理');
                                }
                            }
                        });

                        // 2. 图表状态事件 - 使用 jscommon 标准的 CHART_STATUS 事件
                        // 这个事件在每次 Draw() 后触发，用于检测数据变化
                        // 注意：只在数据真正变化时才触发分析，避免重复触发
                        hqchart.AddEventCallback({
                            event: JSCHART_EVENT_ID.CHART_STATUS,
                            callback: function (event, data, obj) {
                                // CHART_STATUS 在每次绘制后触发，但只在以下情况才触发分析：
                                // 1. 有新的历史数据（_pendingHistoryData不为空）
                                // 2. 数据量发生变化
                                // 3. 股票代码发生变化
                                if (!self.IsEnabled) return;
                                
                                var klineChart = self.GetKLineChart();
                                var hqchart = klineChart && klineChart.Chart ? klineChart.Chart.JSChartContainer : null;
                                if (!hqchart) return;
                                
                                var kData = hqchart.ChartPaint && hqchart.ChartPaint[0] ? hqchart.ChartPaint[0].Data : null;
                                var currentCount = (kData && kData.Data) ? kData.Data.length : 0;
                                var currentSymbol = hqchart.Symbol;
                                
                                // 检查是否有新的历史数据
                                var hasNewHistoryData = self._pendingHistoryData && self._pendingHistoryData.length > 0;
                                
                                // 检查数据量是否变化
                                var lastTotal = self._lastState ? self._lastState.total : null;
                                var countChanged = lastTotal !== null && currentCount !== lastTotal;
                                
                                // 检查股票代码是否变化
                                var lastSymbol = self._lastState ? self._lastState.symbol : null;
                                var symbolChanged = lastSymbol !== null && currentSymbol !== lastSymbol;
                                
                                // 只在数据真正变化时才触发分析
                                if (hasNewHistoryData || countChanged || symbolChanged) {
                                    console.log('[Zen] CHART_STATUS: 检测到数据变化，触发分析', {
                                        hasNewHistoryData: hasNewHistoryData,
                                        countChanged: countChanged,
                                        symbolChanged: symbolChanged,
                                        currentCount: currentCount,
                                        lastTotal: lastTotal,
                                        currentSymbol: currentSymbol,
                                        lastSymbol: lastSymbol
                                    });
                                    self.HandleDataChange();
                                }
                            }
                        });

                        // 3. 滚动条变化事件 - 视野变化需要重绘
                        hqchart.AddEventCallback({
                            event: JSCHART_EVENT_ID.ON_SCROLLBAR_SLIDER_CHANGED,
                            callback: function (event, data, obj) {
                                console.log('[Zen] ON_SCROLLBAR_SLIDER_CHANGED 触发');
                                if (self.IsEnabled) {
                                    // 获取并打印当前可见范围
                                    var vr = self.GetVisibleRange();
                                    console.log('[Zen] ON_SCROLLBAR_SLIDER_CHANGED: GetVisibleRange=', vr ? `{Start:${vr.Start}, End:${vr.End}}` : 'null');
                                    self._scheduleAnalysis(false);
                                }
                            }
                        });
                    }

                    // 启动轮询检测可见范围变化（箭头键/缩放不会触发事件，需要轮询）
                    this._startVisibleRangePolling();
                };

                // 轮询检测可见范围变化
                this._startVisibleRangePolling = function () {
                    if (this._pollingTimer) return; // 已在运行
                    var self = this;
                    var lastDataCount = 0;
                    this._pollingTimer = setInterval(function () {
                        if (!self.IsEnabled) return;
                        // 冷却中，跳过
                        if (self._analysisCooldown) return;

                        var vr = self.GetVisibleRange();
                        if (!vr) return;

                        var klineChart = self.GetKLineChart();
                        if (!klineChart || !klineChart.Chart || !klineChart.Chart.JSChartContainer) return;
                        var hqchart = klineChart.Chart.JSChartContainer;
                        var paint = hqchart.ChartPaint && hqchart.ChartPaint[0];

                        // 优先使用 _pendingHistoryData，其次使用 ChartPaint 中的数据
                        var kData = null;
                        var count = 0;
                        if (this._pendingHistoryData && this._pendingHistoryData.length > 0) {
                            kData = { Data: this._pendingHistoryData };
                            count = this._pendingHistoryData.length;
                        } else {
                            kData = paint && (paint.Data || (hqchart.ChartPaint[0].Data));
                            count = kData && kData.Data ? kData.Data.length : 0;
                        }

                        // 检查是否需要更多历史数据
                        var period = hqchart.Period;
                        var currentSymbol = hqchart.Symbol;
                        var isMinutePeriod = (typeof period === 'number' && period >= 4);

                        // 周期或股票切换时，重置扩展状态
                        if (self._rangeExpandState.period !== period || self._rangeExpandState.symbol !== currentSymbol) {
                            console.log('[Zen] 轮询: 重置扩展状态 (period: ' + self._rangeExpandState.period + ' -> ' + period + ', symbol: ' + self._rangeExpandState.symbol + ' -> ' + currentSymbol + ', count=' + count + ')');

                            var targetDayCount = null;
                            // 股票切换时，总是触发 DayCount 设置（确保获取足够数据）
                            if (isMinutePeriod && hqchart.ChangeDayCount) {
                                var barsPerDayMap = { 4: 240, 5: 48, 6: 16, 7: 8, 8: 4 };
                                var barsPerDay = barsPerDayMap[period] || 8;
                                targetDayCount = Math.ceil(500 / barsPerDay);
                                targetDayCount = Math.max(targetDayCount, 60);
                                console.log('[Zen] 轮询: 股票切换，触发 ChangeDayCount(' + targetDayCount + ') 当前 DayCount=' + hqchart.DayCount);
                                self._rangeExpandState.lastRequestDayCount = targetDayCount;
                                hqchart.ChangeDayCount(targetDayCount);
                            }

                            self._rangeExpandState = {
                                lastCount: count, stableTicks: 0, lastRequestDayCount: targetDayCount, noMore: false,
                                period: period, symbol: currentSymbol, lastRequestTime: 0, leftmostSeen: count, rightmostSeen: 0,
                                targetDayCount: targetDayCount,
                                pendingDayCount: targetDayCount  // 标记待验证的目标天数
                            };
                            lastDataCount = count;

                            // 立即检查数据是否足够（不使用 setTimeout，避免竞态）
                            if (isMinutePeriod && targetDayCount) {
                                var barsPerDayMap2 = { 4: 240, 5: 48, 6: 16, 7: 8, 8: 4 };
                                var barsPerDay2 = barsPerDayMap2[period] || 8;
                                var expectedMinBars = targetDayCount * barsPerDay2;
                                if (count < expectedMinBars) {
                                    // 数据不足，延迟验证
                                    setTimeout(function () {
                                        if (self.IsEnabled && self._rangeExpandState.pendingDayCount) {
                                            var vrNow = self.GetVisibleRange();
                                            var hqNow = klineChart && klineChart.Chart ? klineChart.Chart.JSChartContainer : null;
                                            var countNow = 0;
                                            if (hqNow && hqNow.ChartPaint && hqNow.ChartPaint[0] && hqNow.ChartPaint[0].Data && hqNow.ChartPaint[0].Data.Data) {
                                                countNow = hqNow.ChartPaint[0].Data.Data.length;
                                            }
                                            var currentDayCountNow = hqNow ? hqNow.DayCount : 0;
                                            console.log('[Zen] 轮询: 延迟验证 count=' + countNow + ' (目标=' + expectedMinBars + ') DayCount=' + currentDayCountNow);
                                            if (countNow < expectedMinBars && currentDayCountNow < targetDayCount) {
                                                console.log('[Zen] 轮询: 重试 ChangeDayCount(' + targetDayCount + ')');
                                                if (hqNow && hqNow.ChangeDayCount) hqNow.ChangeDayCount(targetDayCount);
                                            } else {
                                                self._rangeExpandState.pendingDayCount = null;
                                            }
                                        }
                                    }, 1000);
                                } else {
                                    self._rangeExpandState.pendingDayCount = null;
                                }
                            }
                        }
                        // 检测数据量是否达到目标（股票切换后可能需要多次尝试）
                        else if (isMinutePeriod && self._rangeExpandState.pendingDayCount && count < 500) {
                            // 检查当前 DayCount 是否达到目标
                            var currentDayCount = hqchart.DayCount || 0;
                            var targetDayCount = self._rangeExpandState.targetDayCount;
                            var barsPerDayMap = { 4: 240, 5: 48, 6: 16, 7: 8, 8: 4 };
                            var barsPerDay = barsPerDayMap[period] || 8;
                            var expectedMinBars = targetDayCount * barsPerDay;

                            if (count < expectedMinBars && currentDayCount < targetDayCount) {
                                // 数据量不足，重新触发 DayCount
                                console.log('[Zen] 轮询: 数据量不足 count=' + count + ' < ' + expectedMinBars + '，重试 DayCount=' + targetDayCount + ' (当前 DayCount=' + currentDayCount + ')');
                                hqchart.ChangeDayCount(targetDayCount);
                            } else {
                                self._rangeExpandState.pendingDayCount = null;
                            }
                        }
                        if (count > 0 && count < 8000) {
                            // 如果数据量有增加，说明 HQChart 在下载
                            if (count !== self._rangeExpandState.lastCount) {
                                console.log('[Zen] 轮询: 数据量变化 ' + self._rangeExpandState.lastCount + ' -> ' + count);
                                self._rangeExpandState.lastCount = count;
                                self._rangeExpandState.stableTicks = 0;
                                self._rangeExpandState.noMore = false;
                                self._rangeExpandState.leftmostSeen = Math.min(self._rangeExpandState.leftmostSeen || count, vr.Start);
                                lastDataCount = count;
                                if (self._requestingMoreData) self._requestingMoreData = false;
                                // 数据有变化，重新分析
                                self._lastState = null;
                                self._scheduleAnalysis(false);
                            } else {
                                self._rangeExpandState.stableTicks += 1;
                                // 记录最左位置（用户持续向左滚动）
                                if (vr.Start < (self._rangeExpandState.leftmostSeen || count)) {
                                    self._rangeExpandState.leftmostSeen = vr.Start;
                                    // 用户继续向左滚动，重置 noMore 状态，允许获取更早数据
                                    if (self._rangeExpandState.noMore) {
                                        console.log('[Zen] 轮询: 用户继续左滚，重置 noMore 状态');
                                        self._rangeExpandState.noMore = false;
                                    }
                                }
                                // 记录最右位置（用户持续向右滚动/向下按键）
                                if (vr.End > (self._rangeExpandState.rightmostSeen || 0)) {
                                    self._rangeExpandState.rightmostSeen = vr.End;
                                    // 用户继续向下滚动，重置 noMore 状态，允许获取更新数据
                                    if (self._rangeExpandState.noMore) {
                                        console.log('[Zen] 轮询: 用户继续下滚，重置 noMore 状态');
                                        self._rangeExpandState.noMore = false;
                                    }
                                }
                            }
                            // 左侧触发：vr.Start < threshold（进入左侧区域）
                            var threshold = Math.max(50, Math.floor(count * 0.2));
                            // 右侧触发：vr.End 接近数据末尾（显示最新数据时可能需要更多）
                            var rightThreshold = Math.max(5, Math.floor(count * 0.02));
                            var nearRightEdge = (vr.End >= count - 1 - rightThreshold);

                            // 左侧扩展逻辑（分钟周期）
                            if (isMinutePeriod && vr.Start < threshold && !self._requestingMoreData && !self._rangeExpandState.noMore) {
                                if (hqchart.ChangeDayCount) {
                                    var barsPerDayMap = { 4: 240, 5: 48, 6: 16, 7: 8, 8: 4 };
                                    var barsPerDay = barsPerDayMap[period] || 0;
                                    var estimatedDayCount = barsPerDay > 0 ? Math.max(1, Math.ceil(count / barsPerDay)) : 1;
                                    var currentDayCount = (typeof hqchart.DayCount === 'number' && hqchart.DayCount > 0) ? hqchart.DayCount : (self._rangeExpandState.lastRequestDayCount || estimatedDayCount);
                                    var stepDayCount = barsPerDay > 0 ? Math.max(5, Math.ceil(200 / barsPerDay)) : 50;
                                    var nextDayCount = currentDayCount + stepDayCount;
                                    self._rangeExpandState.lastRequestDayCount = nextDayCount;
                                    self._rangeExpandState.lastRequestTime = Date.now();
                                    self._rangeExpandState.leftmostSeen = vr.Start; // 重置最左位置
                                    self._requestingMoreData = true;
                                    console.log('[Zen] 轮询: 触发扩展数据, count=' + count + ', vr.Start=' + vr.Start + ', threshold=' + threshold + ', HQ_DayCount=' + hqchart.DayCount + ', 请求 DayCount=' + nextDayCount);
                                    hqchart.ChangeDayCount(nextDayCount);
                                }
                            }
                            // 右侧扩展逻辑（分钟周期，用户向下按键查看更多最新数据）
                            else if (isMinutePeriod && nearRightEdge && !self._requestingMoreData && !self._rangeExpandState.noMore) {
                                if (hqchart.ChangeDayCount) {
                                    var barsPerDayMap = { 4: 240, 5: 48, 6: 16, 7: 8, 8: 4 };
                                    var barsPerDay = barsPerDayMap[period] || 0;
                                    var estimatedDayCount = barsPerDay > 0 ? Math.max(1, Math.ceil(count / barsPerDay)) : 1;
                                    var currentDayCount = (typeof hqchart.DayCount === 'number' && hqchart.DayCount > 0) ? hqchart.DayCount : (self._rangeExpandState.lastRequestDayCount || estimatedDayCount);
                                    // 右侧扩展时保持或略微增加 DayCount（避免重复请求相同数据）
                                    var nextDayCount = Math.max(currentDayCount, self._rangeExpandState.lastRequestDayCount || estimatedDayCount);
                                    // 只有当 DayCount 小于当前估计天数时才增加
                                    if (currentDayCount < estimatedDayCount) nextDayCount = estimatedDayCount;
                                    else nextDayCount = currentDayCount;

                                    self._rangeExpandState.lastRequestDayCount = nextDayCount;
                                    self._rangeExpandState.lastRequestTime = Date.now();
                                    self._rangeExpandState.rightmostSeen = vr.End; // 重置最右位置
                                    self._requestingMoreData = true;
                                    console.log('[Zen] 轮询: 右侧触发扩展, vr.End=' + vr.End + ', count=' + count + ', HQ_DayCount=' + hqchart.DayCount + ', 请求 DayCount=' + nextDayCount);
                                    hqchart.ChangeDayCount(nextDayCount);
                                }
                            } else if (self._requestingMoreData && self._rangeExpandState.stableTicks >= 8) {
                                // 请求后数据稳定不增加，可能是到了数据源限制
                                if (count > self._rangeExpandState.lastCount * 1.1) {
                                    // 数据有实质增加，重置状态继续监控
                                    console.log('[Zen] 轮询: 请求后数据有增加，继续监控');
                                    self._requestingMoreData = false;
                                    self._rangeExpandState.stableTicks = 0;
                                } else {
                                    self._requestingMoreData = false;
                                    self._rangeExpandState.noMore = true;
                                    console.log('[Zen] 轮询: 数据量稳定，停止扩展 (count=' + count + ', lastCount=' + self._rangeExpandState.lastCount + ')');
                                }
                            }
                        }

                        // 检查是否需要扩展数据（可见范围起点 < 已发送数据起点）
                        // 只有不在冷却中才触发
                        if (self._lastSentDataOffset !== null && vr.Start < self._lastSentDataOffset && !self._analysisCooldown) {
                            console.log('[Zen] 轮询: vr.Start=' + vr.Start + ' < _lastSentDataOffset=' + self._lastSentDataOffset + '，触发分析');
                            self.ClearDrawings(false);
                            self._lastState = null;
                            self._scheduleAnalysis(false);
                        }
                    }, 500); // 每500ms检查一次
                };

                this._stopVisibleRangePolling = function () {
                    if (this._pollingTimer) {
                        clearInterval(this._pollingTimer);
                        this._pollingTimer = null;
                    }
                };

                this.StopAnalysis = function () {
                    this.IsEnabled = false;
                    this.ClearDrawings(false);

                    // 停止轮询
                    this._stopVisibleRangePolling();

                    // 禁用配置按钮
                    this._updateConfigButtonsState(false);

                    // 清空缓存（用户关闭时释放内存）
                    this.ClearAnalysisCache();

                    var klineChart = this.GetKLineChart();
                    var hqchart = klineChart && klineChart.Chart ? klineChart.Chart.JSChartContainer : null;
                    if (hqchart) {
                        hqchart.RemoveEventCallback(JSCHART_EVENT_ID.RECV_HISTROY_DATA);
                        hqchart.RemoveEventCallback(JSCHART_EVENT_ID.CHART_STATUS);
                        hqchart.RemoveEventCallback(JSCHART_EVENT_ID.ON_SCROLLBAR_SLIDER_CHANGED);
                    }
                    if (this.Worker) { try { this.Worker.terminate(); } catch (e) { } this.Worker = null; }
                    this.WorkerReady = false;
                    this._licenseChecked = false; // 重置授权检查标志
                    this._lastState = null;
                    this._lastSentDataOffset = null; // 重置数据发送缓存
                    // 清理所有定时器
                    if (this._waitingTimer) { try { clearTimeout(this._waitingTimer); } catch (e) { } this._waitingTimer = null; }
                    if (this._analyzeTimer) { try { clearTimeout(this._analyzeTimer); } catch (e) { } this._analyzeTimer = null; }
                    if (this._pendingExtractTimer) { try { clearTimeout(this._pendingExtractTimer); } catch (e) { } this._pendingExtractTimer = null; }
                    try { if (window.ChartContainer && typeof window.ChartContainer.LogZen === 'function') window.ChartContainer.LogZen(''); } catch (e) { }
                };

                // OnWorkerMessage 必须在 EnsureWorker 之前定义（因为 Worker.onmessage 会调用它）
                this.OnWorkerMessage = function (msg) {
                    if (!msg || !msg.id) return;

                    // 处理版本号消息
                    if (msg.id === 'version') {
                        var versionElem = document.getElementById('AppVersion');
                        if (versionElem && msg.version) {
                            versionElem.textContent = 'V1.4.0 (' + msg.version + ')';
                        }
                    }

                    // 处理设备ID消息，更新 MachineID 并重新显示状态（如果是未授权状态）
                    if (msg.id === 'device_id' && msg.deviceId) {
                        this.MachineID = msg.deviceId;
                        if (!_zenAuthValid) {
                            var infoElem = document.getElementById('LicenseInfo');
                            if (infoElem) {
                                infoElem.textContent = '授权失败';
                                infoElem.style.color = '#ff4d4d';
                            }
                        }
                    }

                    // 处理机器码消息
                    if (msg.id === 'machine_code' && msg.machineCode) {
                        this.MachineID = msg.machineCode;
                        console.log('[Zen] OnWorkerMessage: 获取到机器码 =', this.MachineID);
                    }

                    if (msg.id === 'request_auth_session' && msg.request_id) {
                        var selfZen = this;
                        window.ZenAuthClient.createSession(msg.app_id || 'zen_desktop', msg.platform || 'desktop')
                            .then(function (data) {
                                if (!selfZen.Worker) return;
                                selfZen.Worker.postMessage({
                                    id: 'auth_session_response',
                                    request_id: msg.request_id,
                                    success: true,
                                    attestation: data && data.attestation ? data.attestation : '',
                                    machine_code: data && data.machine_code ? data.machine_code : null,
                                    nonce: data && data.nonce ? data.nonce : '',
                                    app_id: data && data.app_id ? data.app_id : (msg.app_id || 'zen_desktop'),
                                    platform: data && data.platform ? data.platform : (msg.platform || 'desktop')
                                });
                            })
                            .catch(function (e) {
                                if (!selfZen.Worker) return;
                                selfZen.Worker.postMessage({
                                    id: 'auth_session_response',
                                    request_id: msg.request_id,
                                    success: false,
                                    message: e && e.message ? e.message : String(e)
                                });
                            });
                        return;
                    }

                    // MERGED: Handle auth messages
                    if (msg.id === 'auth_result') {
                        var result = msg.result;
                        var safeMessage = this.NormalizeAuthMessage(result && result.message);
                        if (result && result.machine_code) {
                            this.MachineID = result.machine_code;
                        }
                        _zenAuthValid = !!result.valid;
                        var badge = document.getElementById('LicenseBadge');
                        if (badge) {
                            if (result.valid) {
                                badge.className = 'LicenseValid';
                            } else {
                                badge.className = 'LicenseInvalid';
                            }
                        }
                        if (result.valid) {
                            // 获取机器码并保存
                            var self = this;
                            setTimeout(function () {
                                fetch('/api/machinecode', { method: 'GET', mode: 'cors', headers: _zenApiHeaders() })
                                    .then(function (resp) { return resp.json(); })
                                    .then(function (data) {
                                        if (data && data.machine_code) {
                                            self.MachineID = data.machine_code;
                                        }
                                    })
                                    .catch(function () { });
                            }, 100);
                            // 保存 token 用于 Worker 重启恢复
                            this._authToken = result.token || '';
                            // 授权成功：显示 "授权类型：XXX"
                            var isPermanent = result.expire_str === '永久有效';
                            var isTrial = result.is_trial === true;
                            var authTypeText;
                            if (isTrial) {
                                authTypeText = '授权类型：试用，剩余' + result.days_left + '天';
                            } else if (isPermanent) {
                                authTypeText = '授权类型：永久';

                            }
                            this._checkAndReAnalyzeDebounced();
                        } else {
                            // 授权失败时在 badge 根据 error_code 区分显示
                            if (badge) {
                                var ec = result.error_code || 0;
                                badge.textContent = ec === 2 ? '授权已过期' : '授权验证失败';
                                badge.className = 'LicenseInvalid';
                            }
                            // 获取机器码（方便用户联系缠论插件作者）
                            var self = this;
                            setTimeout(function () {
                                fetch('/api/machinecode', { method: 'GET', mode: 'cors', headers: _zenApiHeaders() })
                                    .then(function (resp) { return resp.json(); })
                                    .then(function (data) {
                                        if (data && data.machine_code) {
                                            self.MachineID = data.machine_code;
                                        }
                                    })
                                    .catch(function () { });
                            }, 100);
                            // 授权失败后禁用缠论分析按钮（灰色）
                            var zenBtn = document.getElementById('ZenAnalysis');
                            if (zenBtn) {
                                zenBtn.style.cursor = 'not-allowed';
                                zenBtn.style.opacity = '0.6';
                            }
                            // 授权失败后禁用右侧配置按钮
                            this._updateConfigButtonsState(false);
                            // Log to ZenLog
                            try { if (window.ChartContainer && typeof window.ChartContainer.LogZen === 'function') window.ChartContainer.LogZen('授权失败'); } catch (e) { }
                        }
                        return;
                    }
                    if (msg.id === 'auth_error') {
                        _zenAuthValid = false;
                        var badge = document.getElementById('LicenseBadge');
                        if (badge) {
                            badge.className = 'LicenseInvalid';
                            badge.textContent = '插件加载失败';
                        }
                        var infoElem = document.getElementById('LicenseInfo');
                        if (infoElem) {
                            infoElem.textContent = '请联系缠论插件作者获取授权文件';
                            infoElem.style.color = '#ff4d4d';
                        }
                        // 授权失败时也要获取机器码（方便用户联系缠论插件作者）
                        var self = this;
                        setTimeout(function () {
                            fetch('/api/machinecode', { method: 'GET', mode: 'cors', headers: _zenApiHeaders() })
                                .then(function (resp) { return resp.json(); })
                                .then(function (data) {
                                    if (data && data.machine_code) {
                                        self.MachineID = data.machine_code;
                                    }
                                })
                                .catch(function () { });
                        }, 100);
                        // 授权失败后禁用缠论分析按钮（灰色）
                        var zenBtn = document.getElementById('ZenAnalysis');
                        if (zenBtn) {
                            zenBtn.style.cursor = 'not-allowed';
