                        }
                        // 授权失败后禁用右侧配置按钮
                        this._updateConfigButtonsState(false);
                        // Log to ZenLog
                        try { if (window.ChartContainer && typeof window.ChartContainer.LogZen === 'function') window.ChartContainer.LogZen('授权失败'); } catch (e) { }
                        return;
                    }

                    if (msg.id === 'error') {
                        var errorMsg = msg.error || 'Unknown error';
                        // Log to ZenLog if it's an authorization error
                        if (errorMsg.includes('Authorization') || errorMsg.includes('auth') || errorMsg.includes('License')) {
                            try { if (window.ChartContainer && typeof window.ChartContainer.LogZen === 'function') window.ChartContainer.LogZen('授权问题: ' + errorMsg); } catch (e) { }
                        }

                    }

                    if (!this.IsEnabled) return;

                    if (msg.id === 'ready') {

                        // Resolve Worker Ready Promise
                        if (this._workerReadyResolve) {

                            this._workerReadyResolve();
                            this._workerReadyResolve = null;
                        }
                        
                        // Worker 就绪后自动触发授权检查（只在首次）
                        if (!this._licenseChecked) {

                        }
                        return;
                    }
                    if (msg.id === 'result') {
                        console.log('[Zen] OnWorkerMessage result: msg.jobId=', msg.jobId, 'LatestJobId=', this.LatestJobId);

                        // === 单次绘制保证：如果已经绘制过这个jobId，跳过 ===
                        if (msg.jobId === this._lastDrawnJobId) {
                            console.log('[Zen] jobId 已绘制过，跳过');
                            this._setAnalysisState('completed');

                        if (msg.jobId !== this.LatestJobId) {
                            console.log('[Zen] jobId 不匹配，跳过绘制，触发新分析');
                            this._analyzing = false;

<script>
    // ========== 设备ID显示模块 ==========
    const DeviceIdUI = {
        _listenerAdded: false,

        init() {
            const container = document.getElementById('LicenseMachineID');
            if (!container) return;

            // 只注册一次监听器
            if (!this._listenerAdded) {
                this._listenerAdded = true;
                window.addEventListener('message', (e) => {
                    if (e.data.id === 'device_id') {
                        this.show(e.data.deviceId, container);
                        // 同时更新主线程的 MachineID
                        if (window.ChartContainer && window.ChartContainer.MachineID !== undefined) {
                            window.ChartContainer.MachineID = e.data.deviceId;
                        }
                    } else if (e.data.id === 'device_id_set_success') {
                        this.show(e.data.deviceId, container);
                    } else if (e.data.id === 'device_id_error') {
                        console.warn('[DeviceIdUI] 获取设备ID失败:', e.data.error);
                    }
                });
            }
            
            // 直接从服务器获取机器码显示
            if (window.ChartContainer && typeof window.ChartContainer.InitMachineIDFromServer === 'function') {
                window.ChartContainer.InitMachineIDFromServer((id) => {
                    if (id) this.show(id, container);
                });
            }
        },

        show(deviceId, container) {
            if (!deviceId || !container) return;
            container.innerHTML = `
            <span class="device-id-label">机器码:</span>
            <span class="device-id-value" title="点击复制" onclick="DeviceIdUI.copy('${deviceId}', this)">${deviceId}</span>
            <span class="copy-hint">已复制!</span>
        `;
            container.classList.add('show');
        },

        copy(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                const hint = element.parentElement.querySelector('.copy-hint');
                if (hint) hint.classList.add('show');
                setTimeout(() => hint && hint.classList.remove('show'), 2000);
            }).catch(err => {
                console.warn('[DeviceIdUI] 复制失败:', err);
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                const hint = element.parentElement.querySelector('.copy-hint');
                if (hint) hint.classList.add('show');
                setTimeout(() => hint && hint.classList.remove('show'), 2000);
            });
        }
    };

    // ========== 弹窗组件 ==========

            const modal = document.createElement('div');
            modal.id = 'ZenNoticeModal';

                border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                animation: slideUp 0.3s ease-out;

                <div style="background: ${headerColor}; padding: 16px; color: #fff; text-align: center; font-size: 18px; font-weight: bold;">

                // 尝试从 ZenChartCtrl 获取授权检查函数

                    ctrl._licenseChecked = true;

                    if (!window.__zen_check_timer) {
                        window.__zen_check_timer = setInterval(function() {
                            console.log('[Zen] 执行周期性授权检查...');
                            ctrl.CheckLicense();

                    }
                }
                return;
            }

            // 授权结果
            if (msg.id === 'auth_result') {
                const { valid, message, expire_str, features, is_trial, days_left, machine_code } = msg.result;
                const safeMessage = (function () {
                    if (!message) return '未授权';
                    var text = String(message);
                    if (text.indexOf('过期') >= 0) return '授权已过期';
                    if (text.indexOf('机器码') >= 0) return '机器码不匹配';
                    if (text.indexOf('无效' ) >= 0 || text.indexOf('失败') >= 0 || text.indexOf('损坏') >= 0) return '授权验证无效';
                    if (text.indexOf('试用') >= 0) return '试用授权提醒';
                    return text;
                })();
                const badge = document.getElementById('LicenseBadge');
                const info = document.getElementById('LicenseInfo');

                if (valid) {
                    var isPermanent = expire_str === '永久有效';
                    var authTypeText;
                    if (is_trial) {
                        authTypeText = '授权类型：试用，剩余' + days_left + '天';
                    } else if (isPermanent) {
                        authTypeText = '授权类型：永久';
                    } else {
                        authTypeText = '授权类型：正式，剩余' + days_left + '天';
                    }
                    badge.textContent = authTypeText;
                    badge.className = 'LicenseValid';
                    info.innerHTML = '';
                    // 授权成功后初始化设备ID显示
                    DeviceIdUI.init();

                    // 试用期提醒（每日一次）
                    if (is_trial && ModalUI.shouldShowToday('trial')) {
                        ModalUI.show('试用提醒', `这是缠论插件试用证书，还剩 ${days_left} 天到期。\n请联系缠论插件作者 <qhgary@sina.com> 获取正式授权。`);
                    }
                } else {
                    var ec = msg.result.error_code || 0;
                    badge.textContent = ec === 2 ? '授权已过期' : '授权验证失败';
                    badge.className = 'LicenseInvalid';
                    if (machine_code) {
                        info.innerHTML = `${safeMessage || '未授权'} [机器码: ${machine_code}]`;
                    } else {
                        info.innerHTML = safeMessage || '未授权';
                    }
                    // 授权失效提示（每日一次）
                    if (ModalUI.shouldShowToday('expired')) {
                        const ctrl = window.ChartContainer && window.ChartContainer.ZenChartCtrl;
                        const fallbackCode = ctrl && ctrl.MachineID ? ctrl.MachineID : '';
                        const mc = machine_code || fallbackCode;
                        const mcText = mc ? `\n机器码: ${mc}` : '';
                        ModalUI.show('授权过期', `授权已经到期或无效，请联系缠论插件作者<qhgary@sina.com>获取授权文件。${mcText}`, true);
                    }
                }
            }

            // 其他消息透传
            if (msg.id === 'error' || msg.id === 'analyze_result' || msg.id === 'version') {
                window.dispatchEvent(new CustomEvent('zen_message', { detail: msg }));
            }
        };

        window.zenWorker.onerror = function (err) {
            console.error('[Zen] Worker错误:', err);
        };

        var _wkToken = new URLSearchParams(window.location.search).get('token') || '';
        window.zenWorker.postMessage({ id: 'init', token: _wkToken });

        // 【新增】Worker 初始化后，将主线程生成的设备ID同步给 Worker
        // 这确保了 Worker 中的设备ID与主线程一致（即使清空缓存也能保持稳定）
        syncDeviceIdToWorker();
    }

    // 将主线程的设备ID同步到 Worker
    async function syncDeviceIdToWorker() {
        try {
            // 等待主线程的设备ID初始化完成
            const ctrl = window.ChartContainer && window.ChartContainer.ZenChartCtrl;
            if (!ctrl) {
                console.log('[Zen] syncDeviceIdToWorker: ZenChartCtrl 未就绪，稍后重试');
                setTimeout(syncDeviceIdToWorker, 1000);
                return;
            }

            // 从主线程的 localStorage 获取设备ID
            const cached = localStorage.getItem('zen_machine_id');
            if (cached && cached.startsWith('zen-')) {
                console.log('[Zen] syncDeviceIdToWorker: 同步设备ID到 Worker:', cached);
                window.zenWorker.postMessage({ id: 'set_device_id', deviceId: cached });
            } else {
                // 主线程还没有生成设备ID，触发生成
                console.log('[Zen] syncDeviceIdToWorker: 主线程设备ID不存在，触发初始化');
                ctrl.InitMachineID();
                // 等待生成完成后再同步
                setTimeout(async () => {
                    const newId = localStorage.getItem('zen_machine_id');
                    if (newId && window.zenWorker) {
                        console.log('[Zen] syncDeviceIdToWorker: 延迟同步设备ID:', newId);
                        window.zenWorker.postMessage({ id: 'set_device_id', deviceId: newId });
                    }
                }, 500);
            }
        } catch (e) {
            console.warn('[Zen] syncDeviceIdToWorker 失败:', e);
        }
    }

    // 页面加载时初始化Worker
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(function () {
            initZenWorker();
            // 第一次刷新清空全部缓存
            if (window.ChartContainer && window.ChartContainer.ZenChartCtrl) {
                window.ChartContainer.ZenChartCtrl.ClearAnalysisCache();
            }
            // Close button click behavior
            const closeBtn = document.getElementById('BtnAndroidClose');
            if (closeBtn) {
                const tryCloseCurrentTab = () => {
                    // Preferred path for script-opened pages.
                    window.open('', '_self');
                    window.close();

                    // Fallback for browsers that require a navigation step first.
                    setTimeout(() => {
                        window.location.replace('about:blank');
                        window.close();
                    }, 120);
                };

                closeBtn.onclick = async () => {
                    try {
                        if (navigator.sendBeacon) {
                            navigator.sendBeacon('/api/stop?token=' + (new URLSearchParams(window.location.search).get('token') || ''));
                        } else {
                            await fetch('/api/stop', { method: 'POST', keepalive: true, headers: _zenApiHeaders() });
                        }
                    } catch (e) {
                        console.warn('[Zen] Failed to notify backend stop API:', e);
                    } finally {
                        tryCloseCurrentTab();
                    }
                };
            }
        }, 500); // 延迟确保DOM就绪
    });
</script>
<script>
(function() {
    'use strict';
    // Keepalive ping：每 500ms 通知后端浏览器窗口仍在显示中
    var pingTimer = setInterval(function() {
        fetch('/main-ping', { method: 'POST', keepalive: true, headers: _zenApiHeaders() }).catch(function() {});
    }, 500);

    // onbeforeunload：浏览器即将关闭时立即通知后端（sendBeacon 比 keepalive 更可靠）
    window.addEventListener('beforeunload', function() {
        clearInterval(pingTimer);
        navigator.sendBeacon('/main-ping?token=' + (new URLSearchParams(window.location.search).get('token') || ''), '');
    });
})();
</script>
